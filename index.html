<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONKEY RECHARGE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #0b1426;
    color: white;
    margin: 0; padding: 0;
    padding-bottom: 80px;
    text-align: center;
  }
  .header {
    background: linear-gradient(135deg, #0f2b48, #0b1426);
    padding: 20px;
    border-bottom: 2px solid #1e3a5f;
  }
  h1 { font-size: 22px; color: #00a8ff; margin: 0; text-shadow: 0 0 10px rgba(0,168,255,0.5); }
  
  /* Server Selection Box */
  .server-box {
    background: #122540;
    margin: 15px auto;
    padding: 12px;
    border-radius: 10px;
    max-width: 450px;
    width: 90%;
    border: 1px solid #1e3a5f;
  }
  .server-title { font-size: 13px; color: #a0aec0; margin-bottom: 8px; text-align: left; }
  .server-inputs { display: flex; gap: 10px; }
  .server-inputs input {
    flex: 1; padding: 10px; background: #081220; border: 1px solid #1e3a5f;
    color: white; border-radius: 6px; text-align: center; font-size: 14px;
  }

  /* Grid Container */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px; padding: 15px;
    max-width: 500px; margin: 0 auto;
  }
  .card {
    background: linear-gradient(180deg, #162e4e, #0f2037);
    border: 1px solid #234675;
    border-radius: 12px;
    padding: 12px 5px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:active { transform: scale(0.95); }
  .card.selected { border-color: #00a8ff; background: #1a3a63; }

  .badge {
    position: absolute; top: -5px; right: -5px;
    background: #20bf6b; color: white;
    font-size: 9px; padding: 3px 6px; border-radius: 8px; font-weight: bold;
  }
  .diamond-img { width: 40px; height: 40px; margin: 0 auto 8px; display: block; }
  .title { font-size: 12px; font-weight: bold; color: #f1f2f6; }
  .old-price { font-size: 10px; color: #ff4d4d; text-decoration: line-through; margin: 3px 0; }
  .new-price { font-size: 13px; font-weight: bold; color: #00a8ff; }

  /* Bottom Order Bar */
  .order-bar {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: #0f2037; padding: 15px 0;
    border-top: 1px solid #234675; display: flex;
    justify-content: space-around; align-items: center; z-index: 100;
  }
  .total-info { text-align: left; padding-left: 20px; }
  .total-title { font-size: 12px; color: #a0aec0; }
  .total-price { font-size: 18px; font-weight: bold; color: #00a8ff; }
  .buy-btn {
    background: #00a8ff; color: white; border: none;
    padding: 12px 30px; border-radius: 25px;
    font-weight: bold; font-size: 15px; cursor: pointer; margin-right: 20px;
    box-shadow: 0 0 15px rgba(0,168,255,0.4);
  }
</style>
</head>
<body>

<div class="header">
  <h1>🐒 MONKEY RECHARGE</h1>
  <p style="font-size: 12px; color: #a0aec0; margin: 5px 0 0 0;">Mobile Legends Diamonds Top-Up</p>
</div>

<div class="server-box">
  <div class="server-title">Game ID & Zone ID ဖြည့်ပါ</div>
  <div class="server-inputs">
    <input type="number" id="gameId" placeholder="Player ID">
    <input type="number" id="zoneId" placeholder="Zone ID">
  </div>
</div>

<div class="grid-container">
  <div class="card" onclick="selectItem('Diamond 11', 831, this)">
    <div class="badge">မစောင့်ရ</div>
    <img class="diamond-img" src="https://img.icons8.com/external-flat-icons-inspirational-three-barba-silhouette/64/000000/external-diamond-casino-flat-icons-inspirational-three-barba-silhouette.png">
    <div class="title">11 💎</div>
    <div class="old-price">900 K</div>
    <div class="new-price">831 K</div>
  </div>

  <div class="card" onclick="selectItem('Diamond 22', 1561, this)">
    <div class="badge">မစောင့်ရ</div>
    <img class="diamond-img" src="https://img.icons8.com/external-flat-icons-inspirational-three-barba-silhouette/64/000000/external-diamond-casino-flat-icons-inspirational-three-barba-silhouette.png">
    <div class="title">22 💎</div>
    <div class="old-price">1700 K</div>
    <div class="new-price">1561 K</div>
  </div>

  <div class="card" onclick="selectItem('Diamond 86', 5249, this)">
    <div class="badge">Hot</div>
    <img class="diamond-img" src="https://img.icons8.com/external-flat-icons-inspirational-three-barba-silhouette/64/000000/external-diamond-casino-flat-icons-inspirational-three-barba-silhouette.png">
    <div class="title">86 💎</div>
    <div class="old-price">5600 K</div>
    <div class="new-price">5249 K</div>
  </div>
</div>

<div class="order-bar">
  <div class="total-info">
    <div class="total-title">ရွေးချယ်ထားသည့် ပစ္စည်း</div>
    <div class="total-price" id="displayPrice">0 MMK</div>
  </div>
  <button class="buy-btn" onclick="placeOrder()">ဝယ်ယူမည်</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  let selectedProduct = "";
  let selectedPrice = 0;

  function selectItem(product, price, element) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    element.classList.add('selected');
    
    selectedProduct = product;
    selectedPrice = price;
    document.getElementById('displayPrice').innerText = price + " MMK";
  }

  function placeOrder() {
    const gId = document.getElementById('gameId').value;
    const zId = document.getElementById('zoneId').value;

    if(!gId || !zId) {
      tg.showAlert("Game ID နှင့် Zone ID ကို ဖြည့်ပေးပါခင်ဗျာ။");
      return;
    }
    if(!selectedProduct) {
      tg.showAlert("ဝယ်ယူမည့် စိန်ပမာဏကို ရွေးချယ်ပေးပါဦး။");
      return;
    }

    // Telegram Bot ထဲကို အချက်အလက် လှမ်းပို့ခြင်း
    const orderData = {
      gameId: gId,
      zoneId: zId,
      product: selectedProduct,
      price: selectedPrice + " MMK"
    };

    tg.sendData(JSON.stringify(orderData));
    tg.close();
  }
</script>
</body>
</html>
