<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAKURA Game Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /* ------------------- CSS တည်ဆောက်ခြင်း ------------------- */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #121826;
    color: white;
    margin: 0;
    padding: 0;
    padding-bottom: 70px; /* Navigation bar အတွက် နေရာချန်ရန် */
  }

  /* Header ပုံစံ */
  .header-banner {
    background: linear-gradient(135deg, #1f4068, #162447);
    padding: 20px;
    text-align: center;
    border-bottom-left-radius: 20px;
    border-bottom-right-radius: 20px;
  }

  /* စာမျက်နှာများ ခွဲခြားခြင်း */
  .page { display: none; padding: 15px; }
  .active-page { display: block; }

  /* ၃ တန်းစီ Grid စနစ် */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .card {
    background-color: #1b263b;
    border: 1px solid #415a77;
    border-radius: 12px;
    padding: 10px 5px;
    text-align: center;
    cursor: pointer;
    position: relative;
  }
  .badge {
    position: absolute;
    top: 5px;
    right: 5px;
    background-color: #e43f5a;
    font-size: 8px;
    padding: 2px 5px;
    border-radius: 5px;
  }
  .card img { width: 40px; height: 40px; }
  .old-price { color: #8d99ae; text-decoration: line-through; font-size: 10px; }
  .new-price { color: #e43f5a; font-weight: bold; font-size: 13px; }

  /* ဝယ်ယူမည့် Form ပေါ့ပ်အပ်ပုံစံ */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center; align-items: center;
    z-index: 100;
  }
  .modal-content {
    background-color: #1b263b;
    padding: 20px;
    border-radius: 15px;
    width: 85%; max-width: 350px;
    box-sizing: border-box;
  }
  input, select {
    width: 100%; padding: 10px; margin: 8px 0;
    background: #0f172a; border: 1px solid #415a77;
    color: white; border-radius: 8px; box-sizing: border-box;
  }
  .submit-btn {
    background-color: #0088cc; color: white; border: none;
    padding: 12px; width: 100%; border-radius: 8px; font-weight: bold;
  }

  /* Order History Table ပုံစံ */
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  th, td { padding: 10px; border: 1px solid #415a77; text-align: left; font-size: 12px; }
  th { background-color: #1f4068; }
  .status-pending { color: #ffb703; }

  /* အောက်ခြေ Navigation Bar ဒီဇိုင်း */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background-color: #0f172a; display: flex;
    justify-content: space-around; padding: 12px 0;
    border-top: 1px solid #1e293b; z-index: 10;
  }
  .nav-item { color: #8d99ae; cursor: pointer; font-size: 12px; font-weight: bold; }
  .nav-item.active { color: #0088cc; }
</style>
</head>
<body>

  <!-- Header -->
  <div class="header-banner">
    <h2>🐒 MONKEY RECHARGE </h2>
    <p style="margin:0; font-size:12px; color:#e2e8f0;">Mobile Legends Diamonds Top-Up</p>
  </div>

  <!-- ------------------- ၁။ SHOP PAGE ------------------- -->
  <div id="shop-page" class="page active-page">
    <div class="grid-container">
      <!-- ကတ်ပြား ၁ -->
      <div class="card" onclick="openOrderModal('Diamond 11', '831 MMK')">
        <div class="badge">Promo</div>
        <img src="https://img.icons8.com/external-flat-icons-inspirational-three-barba-silhouette/64/000000/external-diamond-casino-flat-icons-inspirational-three-barba-silhouette.png">
        <div style="font-size:11px;">Diamond 11</div>
        <div class="old-price">900 MMK</div>
        <div class="new-price">831 MMK</div>
      </div>
      <!-- ကတ်ပြား ၂ -->
      <div class="card" onclick="openOrderModal('Diamond 86', '5,249 MMK')">
        <div class="badge">Promo</div>
        <img src="https://img.icons8.com/external-flat-icons-inspirational-three-barba-silhouette/64/000000/external-diamond-casino-flat-icons-inspirational-three-barba-silhouette.png">
        <div style="font-size:11px;">Diamond 86</div>
        <div class="old-price">5,600 MMK</div>
        <div class="new-price">5,249 MMK</div>
      </div>
      <!-- ကတ်ပြား ၃ -->
      <div class="card" onclick="openOrderModal('Weekly Pass', '6,100 MMK')">
        <div class="badge">Hot</div>
        <img src="https://img.icons8.com/external-flat-icons-inspirational-three-barba-silhouette/64/000000/external-diamond-casino-flat-icons-inspirational-three-barba-silhouette.png">
        <div style="font-size:11px;">Weekly Pass</div>
        <div class="old-price">6,800 MMK</div>
        <div class="new-price">6,100 MMK</div>
      </div>
    </div>
  </div>

  <!-- ------------------- ၂။ MESSAGE (HISTORY) PAGE ------------------- -->
  <div id="message-page" class="page">
    <h3>📋 သင်မှာယူခဲ့သော မှတ်တမ်းများ</h3>
    <table>
      <thead>
        <tr><th>Game ID</th><th>ပစ္စည်း</th><th>ဈေးနှုန်း</th><th>Status</th></tr>
      </thead>
      <tbody id="history-table-body">
        <!-- JavaScript ကနေ ဒီနေရာမှာ လာဖြည့်ပေးပါလိမ့်မယ် -->
      </tbody>
    </table>
  </div>

  <!-- ------------------- ၃။ ORDER MODAL (POPUP FORM) ------------------- -->
  <div id="orderModal" class="modal">
    <div class="modal-content">
      <h3 id="modalProductTitle" style="margin-top:0;">ဝယ်ယူရန်</h3>
      <label>Game ID</label>
      <input type="number" id="gameId" placeholder="ဥပမာ - 12345678" required>
      
      <label>Zone ID</label>
      <input type="number" id="zoneId" placeholder="ဥပမာ - 1234" required>

      <label>ငွေလွှဲမည့်စနစ်</label>
      <select id="paymentMethod">
        <option value="Kpay">Kpay (09123456789)</option>
        <option value="WaveMoney">WavePay (09987654321)</option>
      </select>

      <button class="submit-btn" onclick="submitOrder()">အတည်ပြုပြီး Order တင်မည်</button>
      <button class="submit-btn" style="background:#e43f5a; margin-top:5px;" onclick="closeModal()">ပိတ်မည်</button>
    </div>
  </div>

  <!-- ------------------- ၄။ BOTTOM NAVIGATION BAR ------------------- -->
  <div class="nav-bar">
    <div class="nav-item active" onclick="switchPage('shop-page', this)">🛒 SHOP</div>
    <div class="nav-item" onclick="switchPage('message-page', this)">📋 HISTORY</div>
  </div>
   
}
</script>
</body>
</html>
