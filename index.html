<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAKURA Game Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {
font-family: Arial, sans-serif;
background-color: #1a1a2e;
color: white;
text-align: center;
padding: 20px;
}
.card {
background-color: #162447;
padding: 15px;
border-radius: 10px;
margin: 15px auto;
max-width: 300px;
box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
}
.buy-btn {
background-color: #e43f5a;
color: white;
border: none;
padding: 10px 20px;
border-radius: 5px;
cursor: pointer;
font-weight: bold;
}
</style>
</head>
<body>

<h1>monkey</h1>
<p>Mobile Legends Diamonds Top-Up</p>

<div class="card">
<h3>💎 86 Diamonds</h3>
<p>Price: 3,500 MMK</p>
<button class="buy-btn" onclick="buyDiamonds()">ဝယ်ယူမည်</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function buyDiamonds() {
tg.showPopup({
title: 'Order တင်ရန်',
message: 'စိန် 86 လုံး ဝယ်ယူရန် သေချာပါသလား?',
buttons: [{type: 'ok'}]
});
}
</script>
</body>
</html>
